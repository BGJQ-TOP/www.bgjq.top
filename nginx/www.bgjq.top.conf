# ============================================================
# 邦国崛起 IP 全球化主站 - Nginx 配置
# PHP 8.4 | IPv4 only | 仅 www.bgjq.top
# 部署路径: /etc/nginx/sites-available/www.bgjq.top
# ============================================================

server {
    listen 80;
    server_name www.bgjq.top;

    root /var/www/www.bgjq.top;
    index index.php index.html;

    # 日志
    access_log /var/log/nginx/bgjq-access.log;
    error_log  /var/log/nginx/bgjq-error.log;

    # 安全：禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # 安全：禁止访问敏感目录
    location ~ ^/(app|config|database|routes|scripts|sql|storage|views)/ {
        deny all;
        return 404;
    }

    # URL 美化：直接访问 .php 文件时 301 重定向到无后缀版本
    location ~ ^/(?!index\.php)(.*)\.php$ {
        return 301 $scheme://$host/$1$is_args$args;
    }

    # 静态资源 - 直接由 Nginx 返回
    location /public/ {
        alias /var/www/www.bgjq.top/public/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";

        # 字体文件跨域
        location ~* \.(woff2?|ttf|otf|eot)$ {
            add_header Access-Control-Allow-Origin "*";
            expires 365d;
        }

        # 图片
        location ~* \.(jpg|jpeg|png|gif|webp|svg|ico)$ {
            expires 365d;
        }

        # CSS / JS
        location ~* \.(css|js)$ {
            expires 30d;
        }
    }

    # IndexNow 验证文件
    location = /bb19952ad18747dda40ae3bbf4f4007e.txt {
        try_files $uri =404;
    }

    # robots.txt
    location = /robots.txt {
        alias /var/www/www.bgjq.top/public/robots.txt;
    }

    # favicon
    location = /favicon.ico {
        alias /var/www/www.bgjq.top/public/images/favicon.ico;
    }

    # sitemap
    location ~* ^/sitemap(-\w+)?\.xml$ {
        try_files $uri /index.php?$args;
    }

    # 主路由 - 全部交给 index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP 8.4 FPM
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PHP_VALUE "
            error_log=/var/log/nginx/bgjq-php-error.log
        ";
        fastcgi_read_timeout 300;
    }
}

